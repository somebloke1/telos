name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate release notes
      id: release_notes
      run: |
        # Get the tag version
        TAG=${GITHUB_REF#refs/tags/}
        echo "version=$TAG" >> $GITHUB_OUTPUT

        # Generate release notes from commits
        echo "## What's Changed" > release_notes.md
        echo "" >> release_notes.md
        echo "### Features" >> release_notes.md
        git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD | grep -i "feat" >> release_notes.md || echo "- No feature changes" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Bug Fixes" >> release_notes.md
        git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD | grep -i "fix" >> release_notes.md || echo "- No bug fixes" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Documentation" >> release_notes.md
        git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD | grep -i "doc" >> release_notes.md || echo "- No documentation changes" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Installation" >> release_notes.md
        echo "\`\`\`bash" >> release_notes.md
        echo "# Clone or download" >> release_notes.md
        echo "git clone https://github.com/somebloke1/telos.git" >> release_notes.md
        echo "cd telos" >> release_notes.md
        echo "" >> release_notes.md
        echo "# Use with Pi" >> release_notes.md
        echo "pi -e ./src/index.ts" >> release_notes.md
        echo "\`\`\`" >> release_notes.md

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}