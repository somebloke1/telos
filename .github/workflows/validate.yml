name: Validate Project

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check project structure
      run: |
        echo "Checking project structure..."
        test -f package.json || exit 1
        test -f README.md || exit 1
        test -f LICENSE.md || exit 1
        test -f .gitignore || exit 1
        test -d src || exit 1
        test -f src/index.ts || exit 1
        echo "✓ Project structure is valid"

    - name: Check TypeScript files
      run: |
        echo "Checking TypeScript files..."
        for file in src/*.ts; do
          test -f "$file" || exit 1
          echo "✓ Found $file"
        done
        echo "✓ All TypeScript files present"

    - name: Check documentation
      run: |
        echo "Checking documentation files..."
        test -f CONTRIBUTING.md || exit 1
        test -f TESTING.md || exit 1
        test -f EXAMPLES.md || exit 1
        test -d docs || exit 1
        test -f docs/design.md || exit 1
        test -f docs/research/codex_goal_feature_research.md || exit 1
        echo "✓ Documentation is complete"

    - name: Check for TODO comments
      run: |
        echo "Checking for TODO comments..."
        if grep -r "TODO" src/; then
          echo "⚠ Found TODO comments in source code"
        else
          echo "✓ No TODO comments found"
        fi

    - name: Validate package.json
      run: |
        echo "Validating package.json..."
        node -e "const pkg = require('./package.json'); console.log('✓ package.json is valid JSON'); console.log('  Name:', pkg.name); console.log('  Version:', pkg.version);"

    - name: Check line endings
      run: |
        echo "Checking line endings..."
        if find . -type f -name "*.ts" -o -name "*.md" | xargs file | grep -I CRLF; then
          echo "⚠ Some files have CRLF line endings"
        else
          echo "✓ All files have LF line endings"
        fi

    - name: Check for large files
      run: |
        echo "Checking for large files..."
        LARGE_FILES=$(find . -type f -size +100k ! -path "./.git/*" ! -path "./node_modules/*")
        if [ -n "$LARGE_FILES" ]; then
          echo "⚠ Found large files:"
          echo "$LARGE_FILES"
        else
          echo "✓ No large files found"
        fi